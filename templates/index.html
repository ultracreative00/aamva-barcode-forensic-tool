<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AAMVA Forensic Tool</title>
<style>
:root,[data-theme="light"]{
  --bg:#f7f6f2;--surface:#fff;--surface2:#f3f0ec;--border:#ddd;
  --text:#28251d;--muted:#7a7974;--faint:#bbb;
  --primary:#01696f;--primary-h:#0c4e54;
  --pass:#437a22;--fail:#a12c7b;--warn:#964219;
  --pass-bg:#d4dfcc;--fail-bg:#e0ced7;--warn-bg:#ddcfc6;
  --card-shadow:0 2px 12px rgba(0,0,0,.08);
}
[data-theme="dark"]{
  --bg:#141312;--surface:#1c1b19;--surface2:#252422;--border:#333;
  --text:#cdccca;--muted:#797876;--faint:#4a4947;
  --primary:#4f98a3;--primary-h:#227f8b;
  --pass:#6daa45;--fail:#d163a7;--warn:#bb653b;
  --pass-bg:#2a3a25;--fail-bg:#3d2a35;--warn-bg:#3a2e25;
  --card-shadow:0 2px 16px rgba(0,0,0,.4);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}
a{color:var(--primary)}
body>header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:15px;letter-spacing:-.2px}
.logo svg{flex-shrink:0}
.badge{font-size:10px;padding:2px 6px;border-radius:99px;background:var(--primary);color:#fff;font-weight:600}
#theme-btn{background:none;border:none;cursor:pointer;color:var(--muted);padding:4px;border-radius:6px;line-height:1}
#theme-btn:hover{color:var(--text)}
main{max-width:1200px;margin:0 auto;padding:24px 16px}
/* drop zone */
#drop-zone{
  border:2px dashed var(--border);border-radius:12px;padding:48px 24px;
  text-align:center;cursor:pointer;transition:border-color .2s,background .2s;
  background:var(--surface);
}
#drop-zone.drag{border-color:var(--primary);background:color-mix(in oklch,var(--primary) 8%,var(--surface))}
#drop-zone h2{font-size:18px;margin-bottom:8px}
#drop-zone p{color:var(--muted);font-size:13px}
#file-input{display:none}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:background .15s}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-h)}
.btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--primary);color:var(--primary)}
/* toolbar */
#toolbar{display:none;align-items:center;gap:12px;margin-top:20px;flex-wrap:wrap}
#file-list-chips{display:flex;gap:6px;flex-wrap:wrap;flex:1}
.chip{font-size:11px;padding:3px 10px;border-radius:99px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);display:flex;align-items:center;gap:4px}
/* results */
#results-area{margin-top:24px;display:grid;gap:16px}
.result-card{
  background:var(--surface);border:1px solid var(--border);border-radius:12px;
  box-shadow:var(--card-shadow);overflow:hidden;
}
.rc-header{
  display:flex;align-items:center;gap:10px;padding:12px 16px;
  border-bottom:1px solid var(--border);cursor:pointer;user-select:none;
}
.rc-header h3{flex:1;font-size:14px;font-weight:600}
.verdict-badge{
  font-size:11px;font-weight:700;padding:3px 10px;border-radius:99px;letter-spacing:.4px
}
.authentic{background:var(--pass-bg);color:var(--pass)}
.warn{background:var(--warn-bg);color:var(--warn)}
.fail{background:var(--fail-bg);color:var(--fail)}
.error{background:var(--fail-bg);color:var(--fail)}
.rc-body{padding:16px;display:none}
.rc-body.open{display:block}
/* tabs */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:16px}
.tab-btn{padding:7px 14px;font-size:12px;font-weight:600;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;color:var(--muted);transition:color .15s}
.tab-btn.active{color:var(--primary);border-bottom-color:var(--primary)}
.tab-pane{display:none}
.tab-pane.active{display:block}
/* grid layout */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:640px){.two-col{grid-template-columns:1fr}}
/* tables */
table{width:100%;border-collapse:collapse;font-size:12px}
th,td{padding:6px 10px;text-align:left;border-bottom:1px solid var(--border)}
th{color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
tr:last-child td{border-bottom:none}
.tag{font-family:monospace;font-weight:700;color:var(--primary)}
.val{font-family:monospace}
/* verdict list */
.check-list{list-style:none;display:flex;flex-direction:column;gap:4px}
.check-item{display:flex;align-items:center;gap:8px;font-size:12px}
.check-item .icon{width:16px;height:16px;flex-shrink:0;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900}
.icon-pass{background:var(--pass-bg);color:var(--pass)}
.icon-fail{background:var(--fail-bg);color:var(--fail)}
/* header bytes row */
.hbytes{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.hbyte{font-family:monospace;font-size:11px;padding:3px 8px;border-radius:6px;background:var(--surface2);border:1px solid var(--border)}
.hbyte.ok{border-color:var(--pass);color:var(--pass)}
.hbyte.bad{border-color:var(--fail);color:var(--fail)}
/* compare */
#compare-area{display:none;margin-top:24px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px}
#compare-area h2{font-size:15px;font-weight:700;margin-bottom:12px}
.compare-selects{display:flex;gap:12px;align-items:flex-end;margin-bottom:16px;flex-wrap:wrap}
select{padding:7px 10px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px}
/* stats bar */
#stats-bar{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:20px;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:10px}
.stat{display:flex;flex-direction:column;gap:2px}
.stat-val{font-size:20px;font-weight:800;line-height:1}
.stat-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.stat-val.green{color:var(--pass)}
.stat-val.red{color:var(--fail)}
.stat-val.yellow{color:var(--warn)}
/* loading */
#loading{display:none;text-align:center;padding:40px;color:var(--muted)}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.raw-box{font-family:monospace;font-size:11px;white-space:pre-wrap;word-break:break-all;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:10px;max-height:160px;overflow-y:auto;color:var(--muted)}
.missing-tag{font-family:monospace;font-size:11px;padding:2px 7px;border-radius:4px;background:var(--fail-bg);color:var(--fail);display:inline-block;margin:2px}
.subfile-row{display:flex;gap:8px;align-items:center;font-size:12px;margin:4px 0}
</style>
</head>
<body>
<header>
  <div class="logo">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="3" width="18" height="18" rx="2"/>
      <path d="M3 9h18M3 15h18M9 9v10M15 9v10"/>
    </svg>
    AAMVA Forensic Tool
    <span class="badge">v2.0</span>
  </div>
  <button id="theme-btn" aria-label="Toggle theme">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  </button>
</header>

<main>
  <!-- Drop Zone -->
  <div id="drop-zone">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="1.5" style="margin:0 auto 12px">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="17 8 12 3 7 8"/>
      <line x1="12" y1="3" x2="12" y2="15"/>
    </svg>
    <h2>Drop barcode images here</h2>
    <p style="margin-bottom:16px">Supports JPG, PNG, BMP — multiple files at once</p>
    <button class="btn btn-primary" onclick="document.getElementById('file-input').click()">
      Browse Files
    </button>
    <input type="file" id="file-input" multiple accept="image/*">
  </div>

  <!-- Toolbar -->
  <div id="toolbar">
    <div id="file-list-chips"></div>
    <button class="btn btn-primary" id="analyse-btn" onclick="runAnalysis()">🔍 Analyse</button>
    <button class="btn btn-ghost" onclick="clearAll()">✕ Clear</button>
  </div>

  <!-- Loading -->
  <div id="loading">
    <div class="spinner"></div>
    Analysing barcodes…
  </div>

  <!-- Stats bar -->
  <div id="stats-bar" style="display:none">
    <div class="stat"><span class="stat-val" id="s-total">0</span><span class="stat-lbl">Files</span></div>
    <div class="stat"><span class="stat-val green" id="s-pass">0</span><span class="stat-lbl">Authentic</span></div>
    <div class="stat"><span class="stat-val yellow" id="s-warn">0</span><span class="stat-lbl">Warnings</span></div>
    <div class="stat"><span class="stat-val red" id="s-fail">0</span><span class="stat-lbl">Failed</span></div>
    <div class="stat"><span class="stat-val red" id="s-err">0</span><span class="stat-lbl">Errors</span></div>
    <div style="flex:1"></div>
    <button class="btn btn-ghost" onclick="toggleCompare()">⇄ Compare</button>
    <button class="btn btn-ghost" onclick="exportJSON()">↓ Export JSON</button>
  </div>

  <!-- Compare Panel -->
  <div id="compare-area">
    <h2>Side-by-Side Field Comparison</h2>
    <div class="compare-selects">
      <div>
        <div style="font-size:11px;color:var(--muted);margin-bottom:4px">Card A</div>
        <select id="cmp-a"></select>
      </div>
      <div>
        <div style="font-size:11px;color:var(--muted);margin-bottom:4px">Card B</div>
        <select id="cmp-b"></select>
      </div>
      <button class="btn btn-primary" onclick="renderCompare()">Compare</button>
    </div>
    <div id="compare-table"></div>
  </div>

  <!-- Results -->
  <div id="results-area"></div>
</main>

<script>
let allFiles = [], lastResults = [];

// ── drag & drop ──────────────────────────────────────────────
const dz = document.getElementById('drop-zone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('drag');
  addFiles([...e.dataTransfer.files]);
});
document.getElementById('file-input').addEventListener('change', e => addFiles([...e.target.files]));

function addFiles(files) {
  const imgs = files.filter(f => f.type.startsWith('image/'));
  allFiles = [...allFiles, ...imgs];
  renderChips();
}

function renderChips() {
  const bar = document.getElementById('toolbar');
  const chips = document.getElementById('file-list-chips');
  bar.style.display = allFiles.length ? 'flex' : 'none';
  chips.innerHTML = allFiles.map((f, i) =>
    `<span class="chip">${esc(f.name)} <span style="cursor:pointer;color:var(--fail)" onclick="removeFile(${i})">✕</span></span>`
  ).join('');
}

function removeFile(i) {
  allFiles.splice(i, 1);
  renderChips();
}

function clearAll() {
  allFiles = []; lastResults = [];
  renderChips();
  document.getElementById('results-area').innerHTML = '';
  document.getElementById('stats-bar').style.display = 'none';
  document.getElementById('compare-area').style.display = 'none';
  document.getElementById('loading').style.display = 'none';
}

// ── analyse ──────────────────────────────────────────────────
async function runAnalysis() {
  if (!allFiles.length) return;
  document.getElementById('loading').style.display = 'block';
  document.getElementById('results-area').innerHTML = '';
  document.getElementById('stats-bar').style.display = 'none';

  const fd = new FormData();
  allFiles.forEach(f => fd.append('files', f));

  try {
    const res = await fetch('/analyse', { method: 'POST', body: fd });
    const data = await res.json();
    lastResults = data;
    renderResults(data);
  } catch(e) {
    document.getElementById('results-area').innerHTML =
      `<div style="color:var(--fail);padding:16px">Server error: ${e.message}<br>Make sure app.py is running on localhost:8000</div>`;
  } finally {
    document.getElementById('loading').style.display = 'none';
  }
}

// ── render ───────────────────────────────────────────────────
function renderResults(results) {
  const area = document.getElementById('results-area');
  let total=results.length, pass=0, warn=0, fail=0, err=0;
  results.forEach(r => {
    if(r.status==='authentic') pass++;
    else if(r.status==='warn') warn++;
    else if(r.status==='fail') fail++;
    else err++;
  });
  document.getElementById('s-total').textContent = total;
  document.getElementById('s-pass').textContent  = pass;
  document.getElementById('s-warn').textContent  = warn;
  document.getElementById('s-fail').textContent  = fail;
  document.getElementById('s-err').textContent   = err;
  document.getElementById('stats-bar').style.display = 'flex';

  // populate compare selects
  ['cmp-a','cmp-b'].forEach((id,ii) => {
    const sel = document.getElementById(id);
    sel.innerHTML = results.map((r,i)=>`<option value="${i}"${i===ii?'selected':''}>${esc(r.file)}</option>`).join('');
  });

  area.innerHTML = results.map((r,i) => renderCard(r, i)).join('');

  // open first card
  if (results.length > 0) {
    const first = area.querySelector('.rc-body');
    if (first) first.classList.add('open');
  }
}

function renderCard(r, idx) {
  const statusLabel = {authentic:'✅ AUTHENTIC', warn:'⚠ WARNING', fail:'❌ FAILED', error:'⚠ ERROR'}[r.status] || r.status;
  const enc = r.encoding_mode === 'binary' ? '🟢 Binary' : r.encoding_mode === 'tilde_escape' ? '🟡 Tilde-Escape' : '❓ Unknown';

  const hdrBytes = r.header_ok
    ? `<span class="hbyte ok">0x40 @</span><span class="hbyte ok">0x0A LF</span><span class="hbyte ok">0x1E RS</span><span class="hbyte ok">0x0D CR</span>`
    : `<span class="hbyte bad">Header bytes ❌</span>`;

  const subfileRows = (r.subfiles||[]).map(sf =>
    `<div class="subfile-row">
      <strong style="font-family:monospace">${esc(sf.id)}</strong>
      <span style="color:var(--muted)">offset=${sf.offset} len=${sf.length}</span>
      <span>${sf.valid ? '✅':'⚠ offset mismatch'}</span>
    </div>`
  ).join('');

  const fieldsTable = Object.entries(r.fields||{}).map(([tag, f]) =>
    `<tr><td class="tag">${esc(tag)}</td><td style="color:var(--muted);font-size:11px">${esc(f.label)}</td><td class="val">${esc(f.val)}</td></tr>`
  ).join('');

  const checksHtml = (r.verdict_checks||[]).map(c =>
    `<li class="check-item">
      <span class="icon ${c.ok?'icon-pass':'icon-fail'}">${c.ok?'✓':'✗'}</span>
      ${esc(c.label)}
    </li>`
  ).join('');

  const datesHtml = (r.dates||[]).length
    ? `<table><thead><tr><th>Field</th><th>Date</th><th>Note</th></tr></thead><tbody>`
      + r.dates.map(d=>`<tr><td class="tag">${esc(d.tag)}</td><td class="val">${esc(d.date)}</td><td>${esc(d.note)}</td></tr>`).join('')
      + `</tbody></table>`
    : `<span style="color:var(--muted);font-size:12px">No dates parsed</span>`;

  const missingHtml = r.missing_mandatory?.length
    ? r.missing_mandatory.map(t=>`<span class="missing-tag">${esc(t)}</span>`).join('')
    : `<span style="color:var(--pass);font-size:12px">✅ None missing</span>`;

  const errsHtml = r.field_errors?.length
    ? r.field_errors.map(e=>`<div style="font-size:11px;color:var(--fail);font-family:monospace;padding:2px 0">${esc(e)}</div>`).join('')
    : `<span style="color:var(--pass);font-size:12px">✅ All values valid</span>`;

  return `
<div class="result-card" id="rc-${idx}">
  <div class="rc-header" onclick="toggleCard(${idx})">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 9v10"/></svg>
    <h3>${esc(r.file)}</h3>
    <span class="verdict-badge ${r.status}">${statusLabel}</span>
    <span style="color:var(--muted);font-size:11px">${r.verdict_passed}/${(r.verdict_checks||[]).length} checks</span>
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="transition:transform .2s" id="arrow-${idx}"><polyline points="6 9 12 15 18 9"/></svg>
  </div>
  <div class="rc-body" id="body-${idx}">
    ${r.error ? `<div style="color:var(--fail);font-size:12px;font-family:monospace;white-space:pre-wrap">${esc(r.error)}</div>` : `
    <!-- Info row -->
    <div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:16px;font-size:12px">
      <span><strong>State:</strong> ${esc(r.state_name)} (IIN: ${esc(r.iin)})</span>
      <span><strong>AAMVA:</strong> v${String(r.aamva_ver).padStart(2,'0')} (${r.aamva_ver ? _verYear(r.aamva_ver) : '?'})</span>
      <span><strong>Juris:</strong> v${String(r.juris_ver).padStart(2,'0')}</span>
      <span><strong>Encoding:</strong> ${enc}</span>
    </div>
    <!-- Header bytes -->
    <div style="margin-bottom:16px">
      <div style="font-size:11px;font-weight:700;color:var(--muted);margin-bottom:4px">HEADER BYTES</div>
      <div class="hbytes">${hdrBytes}</div>
    </div>
    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('verdict',${idx})">Verdict</button>
      <button class="tab-btn" onclick="switchTab('fields',${idx})">Fields (${Object.keys(r.fields||{}).length})</button>
      <button class="tab-btn" onclick="switchTab('dates',${idx})">Dates</button>
      <button class="tab-btn" onclick="switchTab('subfiles',${idx})">Subfiles</button>
      <button class="tab-btn" onclick="switchTab('raw',${idx})">Raw</button>
    </div>
    <div class="tab-pane active" id="tab-verdict-${idx}">
      <div class="two-col">
        <div>
          <div style="font-size:11px;font-weight:700;color:var(--muted);margin-bottom:8px">CHECKS</div>
          <ul class="check-list">${checksHtml}</ul>
        </div>
        <div>
          <div style="font-size:11px;font-weight:700;color:var(--muted);margin-bottom:8px">MISSING MANDATORY FIELDS</div>
          <div>${missingHtml}</div>
          <div style="margin-top:16px">
            <div style="font-size:11px;font-weight:700;color:var(--muted);margin-bottom:8px">FIELD VALUE ERRORS</div>
            <div>${errsHtml}</div>
          </div>
        </div>
      </div>
    </div>
    <div class="tab-pane" id="tab-fields-${idx}">
      <table><thead><tr><th>Tag</th><th>Field</th><th>Value</th></tr></thead><tbody>${fieldsTable}</tbody></table>
    </div>
    <div class="tab-pane" id="tab-dates-${idx}">${datesHtml}</div>
    <div class="tab-pane" id="tab-subfiles-${idx}">${subfileRows || '<span style="color:var(--muted);font-size:12px">No subfile directory (v1–v4?)</span>'}</div>
    <div class="tab-pane" id="tab-raw-${idx}">
      <div class="raw-box">${esc(r.raw_preview)}</div>
    </div>
    `}
  </div>
</div>`;
}

function _verYear(v) {
  const y={1:'2000',2:'2003',3:'2005',4:'2006',5:'2008',6:'2011',7:'2012',8:'2009',9:'2013',10:'2016'};
  return y[v]||'?';
}

function toggleCard(i) {
  const body  = document.getElementById(`body-${i}`);
  const arrow = document.getElementById(`arrow-${i}`);
  body.classList.toggle('open');
  if (arrow) arrow.style.transform = body.classList.contains('open') ? 'rotate(180deg)' : '';
}

function switchTab(name, idx) {
  const body = document.getElementById(`body-${idx}`);
  body.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  body.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  body.querySelector(`#tab-${name}-${idx}`).classList.add('active');
  const btns = body.querySelectorAll('.tab-btn');
  const names = ['verdict','fields','dates','subfiles','raw'];
  btns[names.indexOf(name)].classList.add('active');
}

// ── compare ──────────────────────────────────────────────────
function toggleCompare() {
  const ca = document.getElementById('compare-area');
  ca.style.display = ca.style.display === 'none' ? 'block' : 'none';
}

function renderCompare() {
  const ai = +document.getElementById('cmp-a').value;
  const bi = +document.getElementById('cmp-b').value;
  const ra = lastResults[ai], rb = lastResults[bi];
  if (!ra || !rb) return;

  // encoding mode diff
  let html = '';
  if (ra.encoding_mode !== rb.encoding_mode) {
    html += `<div style="background:var(--warn-bg);color:var(--warn);padding:10px 14px;border-radius:8px;font-size:12px;margin-bottom:12px">
      ⚠ Encoding mode mismatch: <strong>${esc(ra.encoding_mode)}</strong> vs <strong>${esc(rb.encoding_mode)}</strong>.
      Card B used tilde-escape sequences instead of binary bytes.
    </div>`;
  }

  const allTags = [...new Set([...Object.keys(ra.fields||{}), ...Object.keys(rb.fields||{})])].sort();
  html += `<table><thead><tr><th>Tag</th><th>Field</th><th>${esc(ra.file)}</th><th>${esc(rb.file)}</th><th>Match</th></tr></thead><tbody>`;
  allTags.forEach(tag => {
    const va = ra.fields?.[tag]?.val ?? '<MISSING>';
    const vb = rb.fields?.[tag]?.val ?? '<MISSING>';
    const match = va === vb;
    const lbl = (ra.fields?.[tag]?.label || rb.fields?.[tag]?.label || '');
    html += `<tr>
      <td class="tag">${esc(tag)}</td>
      <td style="color:var(--muted);font-size:11px">${esc(lbl)}</td>
      <td class="val">${esc(va)}</td>
      <td class="val">${esc(vb)}</td>
      <td style="font-size:12px;font-weight:700;color:${match?'var(--pass)':'var(--fail)'}">${match?'✅':'❌'}</td>
    </tr>`;
  });
  html += `</tbody></table>`;
  document.getElementById('compare-table').innerHTML = html;
}

// ── utils ────────────────────────────────────────────────────
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function exportJSON() {
  const blob = new Blob([JSON.stringify(lastResults, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `aamva-forensic-${Date.now()}.json`;
  a.click();
}

// ── theme toggle ─────────────────────────────────────────────
const themeBtn = document.getElementById('theme-btn');
let dark = document.documentElement.getAttribute('data-theme') === 'dark';
themeBtn.addEventListener('click', () => {
  dark = !dark;
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  themeBtn.innerHTML = dark
    ? `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`
    : `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>`;
});
</script>
